<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track your recent Vixtev Mobile frontend demo orders and order history.">
  <title>Orders | Vixtev Mobile</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="orders">
  <div data-site-header></div>

  <main>
    <section class="page-hero page-hero--orders">
      <div class="container">
        <div class="page-hero__content">
          <span class="eyebrow">Order History</span>
          <h1>Recent Orders and Delivery Status</h1>
          <p>Every order placed in checkout is saved in localStorage so the storefront behaves like a working frontend ecommerce experience.</p>
        </div>
      </div>
    </section>

    <section class="section-space">
      <div class="container" data-orders-page></div>
    </section>
  </main>

  <div data-site-footer></div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/catalog-fallback.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
